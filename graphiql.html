<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphiQL — GraphQL Profile</title>
  <link rel="stylesheet" href="https://unpkg.com/graphiql@3.7.1/graphiql.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { height: 100vh; display: flex; flex-direction: column; background: #0d1117; }
    .bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px; background: #0d1117; border-bottom: 1px solid #2b3340;
      font-family: "Segoe UI", system-ui, sans-serif; color: #e6edf3;
    }
    .bar a { color: #7c5cff; text-decoration: none; font-size: 0.9rem; }
    .bar a:hover { text-decoration: underline; }
    #graphiql { flex: 1; }
  </style>
</head>
<body>
  <div class="bar">
    <span><b>GraphiQL</b> — query your own data</span>
    <a href="index.html">← back to profile</a>
  </div>
  <div id="graphiql">Loading GraphiQL…</div>

  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/graphiql@3.7.1/graphiql.min.js"></script>
  <script>
    const token = localStorage.getItem("jwt");
    if (!token) {
      // must be signed in to query the API
      window.location.replace("index.html");
    } else {
      const fetcher = GraphiQL.createFetcher({
        url: "https://01.tomorrow-school.ai/api/graphql-engine/v1/graphql",
        headers: { Authorization: `Bearer ${token}` },
      });

      const defaultQuery = `# Welcome! You are querying your own data.
{
  user {
    id
    login
    auditRatio
  }
}`;

      ReactDOM.createRoot(document.getElementById("graphiql")).render(
        React.createElement(GraphiQL, { fetcher, defaultQuery })
      );
    }
  </script>
</body>
</html>
